name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      force_lint_failure:
        description: "Force the lint job to fail (for demo/evidence runs)"
        required: false
        default: false
        type: boolean
      force_security_failure:
        description: "Force the security-scan job to fail (for demo/evidence runs)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - frontend
          - backend
    defaults:
      run:
        working-directory: ${{ matrix.package-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - name: Inject deliberate lint error (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.force_lint_failure == true
        run: |
          if [ "${{ matrix.package-dir }}" = "frontend" ]; then
            echo "const __lint_fail_unused: number = 1;" > __lint_fail_test.ts
          else
            echo "var __lint_fail_unused = 1;" > __lint_fail_test.js
          fi
      - name: Run linter
        run: npm run lint
      - name: Clean up lint failure file
        if: always()
        run: rm -f __lint_fail_test.js __lint_fail_test.ts

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - frontend
          - backend
    defaults:
      run:
        working-directory: ${{ matrix.package-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - run: npm test

  security-scan:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Scan backend dependencies for vulnerabilities
        run: npm audit --omit=dev --audit-level=high
      - name: Demonstrate deliberate security-scan failure (optional)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.force_security_failure }}" = "true" ]; then
            echo "Intentional security-scan failure for CI evidence."
            exit 1
          fi
          echo "Demo flag is false; no forced failure."
