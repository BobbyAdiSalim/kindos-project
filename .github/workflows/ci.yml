name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      force_security_failure:
        description: "Force the security-scan job to fail (for demo/evidence runs)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - frontend
          - backend
    defaults:
      run:
        working-directory: ${{ matrix.package-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - name: TODO add lint command
        run: 'echo "TODO: add a lint script/config for ${{ matrix.package-dir }} and replace this placeholder."'

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - frontend
          - backend
    defaults:
      run:
        working-directory: ${{ matrix.package-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - run: npm test

  security-scan:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Scan backend dependencies for vulnerabilities
        run: npm audit --omit=dev --audit-level=high
      - name: Demonstrate deliberate security-scan failure (optional)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.force_security_failure }}" = "true" ]; then
            echo "Intentional security-scan failure for CI evidence."
            exit 1
          fi
          echo "Demo flag is false; no forced failure."
