name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - frontend
          - backend
    defaults:
      run:
        working-directory: ${{ matrix.package-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm ci
      - name: TODO add lint command
        run: 'echo "TODO: add a lint script/config for ${{ matrix.package-dir }} and replace this placeholder."'

  unit-tests:
    runs-on: ubuntu-latest
