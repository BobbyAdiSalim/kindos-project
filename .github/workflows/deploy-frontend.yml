name: Deploy Frontend

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy frontend from
        required: true
        default: master
        type: string

jobs:
  deploy-frontend:
    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master' &&
        github.event.workflow_run.conclusion == 'success'
      ) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: deployment
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Authenticate to Google Cloud (ADC)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Deploy to Firebase Hosting
        run: |
          npx -y firebase-tools@latest deploy --only hosting --project ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Create deployment summary
        run: |
          {
            echo "### Frontend Deployment Successful"
            echo ""
            echo "**Service**: Firebase Hosting"
            echo "**Project**: \`${{ vars.FIREBASE_PROJECT_ID }}\`"
            echo "**Branch**: \`${{ github.ref_name }}\`"
            echo "**Commit**: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
